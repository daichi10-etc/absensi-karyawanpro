<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi DKJ Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      padding: 20px;
      color: white;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-bottom: 15px;
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #1e3c72;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16325c;
    }

    #status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>ABSENSI DKJ GROUP</h2>
  <div class="subtitle">Sistem Absensi Digital</div>

  <form onsubmit="kirim(event)">
    <input type="text" id="nama" placeholder="Nama Karyawan" required>

    <select id="cabang" required>
      <option value="">Pilih Cabang</option>
      <option>Jepara</option>
      <option>Metro</option>
      <option>Rawuh</option>
    </select>

    <select id="jenis" required>
      <option value="">Jenis Absen</option>
      <option>Masuk</option>
      <option>Pulang</option>
    </select>

    <input type="text" id="kode" placeholder="Kode Harian" required>

    <input type="text" id="lokasi" placeholder="Link Lokasi Google Maps" required>

    <button type="submit">Kirim Absen</button>
  </form>

  <p id="status"></p>
</div>

<script>
function kirim(e) {
  e.preventDefault();

  const nama = document.getElementById("nama").value;
  const cabang = document.getElementById("cabang").value;
  const jenis = document.getElementById("jenis").value;
  const kode = document.getElementById("kode").value;
  const lokasi = document.getElementById("lokasi").value;

  const scriptURL = "https://script.google.com/macros/s/AKfycbwciD_6SiHD-tEYj4Pp7IwkyddG63jVnD9hlLWl98JNZLPn_E95mhaJm5NpdWHC5fXdzg/exec";

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      nama: nama,
      cabang: cabang,
      jenis: jenis,
      kode: kode,
      lokasi: lokasi
    })
  })
  .then(res => {
    document.getElementById("status").innerText = "✅ Absen berhasil disimpan!";
    document.querySelector("form").reset();
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Gagal kirim data";
  });
}
</script>

</body>
</html>
