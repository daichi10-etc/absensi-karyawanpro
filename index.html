<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABSENSI FOTO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#1e3c72;
padding:20px;
color:white;
}

.box{
max-width:400px;
margin:auto;
background:white;
color:black;
padding:20px;
border-radius:12px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>ABSENSI FOTO</h2>

<input type="text" id="nama" placeholder="Nama">

<button onclick="bukaKamera()">
📷 Buka Kamera
</button>

<video id="video" autoplay playsinline></video>

<button onclick="ambilFoto()">
📸 Ambil Foto
</button>

<button onclick="kirim()">
Kirim
</button>

<p id="status"></p>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

let fotoBase64 = "";

// =================
// BUKA KAMERA
// =================
function bukaKamera(){

navigator.mediaDevices
.getUserMedia({

video:{
width:320,
height:240
}

})

.then(stream=>{

document
.getElementById("video")
.srcObject = stream;

});

}

// =================
// AMBIL FOTO
// =================
function ambilFoto(){

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

canvas.width = 320;
canvas.height = 240;

const ctx =
canvas.getContext("2d");

ctx.drawImage(video,0,0,320,240);

// KOMPRES FOTO
fotoBase64 =
canvas.toDataURL(
"image/jpeg",
0.5
);

alert("Foto berhasil diambil");

}

// =================
// KIRIM
// =================
function kirim(){

if(!fotoBase64){

alert("Ambil foto dulu");
return;

}

const data = {

nama:
document.getElementById("nama").value,

foto:fotoBase64

};

fetch(
"https://script.google.com/macros/s/AKfycbxB49l2jbME-bvEESSDHsg3ILzUu0dPP9Gb9RjMP-YpeNhfQrpnTwWs3FHh_415nRH8FA/exec",
{

method:"POST",

body:JSON.stringify(data)

})

.then(r=>r.text())

.then(res=>{

document
.getElementById("status")
.innerText = res;

})

.catch(err=>{

document
.getElementById("status")
.innerText = err;

});

}

</script>

</body>
</html>
