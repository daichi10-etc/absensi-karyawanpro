<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi Karyawan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }
    .box {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
    }
    button {
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Absensi Karyawan</h2>

  <form onsubmit="kirim(event)">
    <input type="text" id="nama" placeholder="Nama" required>

    <select id="cabang" required>
      <option value="">Pilih Cabang</option>
      <option>Jepara</option>
      <option>Metro</option>
      <option>Rawuh</option>
    </select>

    <select id="jenis" required>
      <option value="">Jenis Absen</option>
      <option>Masuk</option>
      <option>Pulang</option>
    </select>

    <input type="text" id="kode" placeholder="Kode Harian" required>

    <input type="text" id="lokasi" placeholder="Link Lokasi Google Maps" required>

    <button type="submit">Kirim</button>
  </form>

  <p id="status"></p>
</div>

<script>
function kirim(e) {
  e.preventDefault();
 const nama = document.getElementById("nama").value;
  const cabang = document.getElementById("cabang").value;
  const jenis = document.getElementById("jenis").value;
  const kode = document.getElementById("kode").value;
  const lokasi = document.getElementById("lokasi").value;

  const scriptURL = "https://script.google.com/macros/s/AKfycbwciD_6SiHD-tEYj4Pp7IwkyddG63jVnD9hlLWl98JNZLPn_E95mhaJm5NpdWHC5fXdzg/exec";

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      nama: nama,
      cabang: cabang,
      jenis: jenis,
      kode: kode,
      lokasi: lokasi
    })
  })
  .then(res => {
    document.getElementById("status").innerText = "✅ Absen berhasil disimpan!";
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Gagal kirim data";
  });
}
</script>

</body>
</html>
