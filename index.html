<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi DKJ Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      padding: 20px;
      color: white;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
    }

    button {
      background: #1e3c72;
      color: white;
      border: none;
      font-weight: bold;
    }

    #status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>ABSENSI DKJ GROUP</h2>

  <form onsubmit="kirim(event)">
    <input type="text" id="nama" placeholder="Nama Karyawan" required>

    <select id="cabang" required>
      <option value="">Pilih Cabang</option>
      <option>Jepara</option>
      <option>Metro</option>
      <option>Rawuh</option>
    </select>

    <select id="jenis" required>
      <option value="">Jenis Absen</option>
      <option>Masuk</option>
      <option>Pulang</option>
    </select>

    <input type="text" id="kode" placeholder="Kode Harian" required>

    <!-- FOTO -->
    <input type="file" id="foto" accept="image/*" capture="environment" required>

    <!-- LOKASI -->
    <input type="text" id="lokasi" placeholder="Klik tombol ambil lokasi" readonly>

    <button type="button" onclick="ambilLokasi()">📍 Ambil Lokasi</button>

    <button type="submit">Kirim Absen</button>
  </form>

  <p id="status"></p>
</div>

<script>
// AMBIL LOKASI MANUAL (BIAR PASTI MUNCUL IZIN)
function ambilLokasi() {
  if (!navigator.geolocation) {
    alert("HP tidak support lokasi");
    return;
  }

  document.getElementById("status").innerText = "Mengambil lokasi...";

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      document.getElementById("lokasi").value =
        "https://maps.google.com/?q=" + lat + "," + lng;

      document.getElementById("status").innerText = "✅ Lokasi berhasil diambil";
    },
    function(err) {
      document.getElementById("status").innerText = "❌ Izinkan akses lokasi dulu!";
    }
  );
}

// KIRIM DATA
function kirim(e) {
  e.preventDefault();

  const nama = document.getElementById("nama").value;
  const cabang = document.getElementById("cabang").value;
  const jenis = document.getElementById("jenis").value;
  const kode = document.getElementById("kode").value;
  const lokasi = document.getElementById("lokasi").value;

  if (!lokasi) {
    alert("Ambil lokasi dulu bro!");
    return;
  }

  const scriptURL = "https://script.google.com/macros/s/AKfycbwciD_6SiHD-tEYj4Pp7IwkyddG63jVnD9hlLWl98JNZLPn_E95mhaJm5NpdWHC5fXdzg/exec";

  document.getElementById("status").innerText = "Mengirim data...";

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      nama, cabang, jenis, kode, lokasi
    })
  })
  .then(res => {
    document.getElementById("status").innerText = "✅ Absen berhasil!";
    document.querySelector("form").reset();
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Gagal kirim";
  });
}
</script>

</body>
</html>
