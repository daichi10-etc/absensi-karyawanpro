<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi DKJ SIMPLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #1e3c72;
  padding: 20px;
  color: white;
}

.box {
  max-width: 420px;
  margin: auto;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #1e3c72;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#status {
  text-align: center;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="box">

<h2>ABSENSI DKJ</h2>

<form onsubmit="kirim(event)">

<input type="text" id="nama" placeholder="Nama Karyawan" required>

<select id="cabang" required>
  <option value="">Pilih Cabang</option>
  <option>Jepara</option>
  <option>Metro</option>
  <option>Rawuh</option>
</select>

<select id="jenis" required>
  <option value="">Jenis Absen</option>
  <option>Masuk</option>
  <option>Pulang</option>
</select>

<input type="text" id="kode" placeholder="Kode Hari Ini" required>

<input type="text" id="lokasi" placeholder="Lokasi GPS" readonly>

<button type="button" onclick="ambilLokasi()">📍 Ambil Lokasi</button>

<button type="submit">Kirim Absensi</button>

</form>

<p id="status"></p>

</div>

<script>

// =====================
// KODE HARIAN OTOMATIS
// =====================
const kodeHariIni = new Date().getDate().toString() + "DKJ";

// =====================
// AMBIL LOKASI GPS
// =====================
function ambilLokasi() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      document.getElementById("lokasi").value = lat + "," + lng;
    }, function() {
      alert("Izinkan GPS dulu!");
    });
  } else {
    alert("Browser tidak support GPS");
  }
}

// =====================
// KIRIM DATA KE GOOGLE SHEET
// =====================
function kirim(e) {
  e.preventDefault();

  const nama = document.getElementById("nama").value;
  const cabang = document.getElementById("cabang").value;
  const jenis = document.getElementById("jenis").value;
  const kode = document.getElementById("kode").value;
  const lokasi = document.getElementById("lokasi").value;

  if (!lokasi) {
    alert("Ambil lokasi dulu!");
    return;
  }

  if (kode !== kodeHariIni) {
    alert("Kode hari ini salah!");
    return;
  }

  const data = {
    waktu: new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" }),
    nama: nama,
    cabang: cabang,
    jenis: jenis,
    kode: kode,
    lokasi: lokasi
  };

  fetch("PASTE_GOOGLE_SCRIPT_URL_DI_SINI", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("status").innerText = "✅ Absen berhasil!";
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ Gagal kirim!";
  });

}

</script>

</body>
</html>
