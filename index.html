<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ABSENSI DKJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#1e3c72;
padding:20px;
color:white;
}

.box{
max-width:420px;
margin:auto;
background:white;
color:black;
padding:20px;
border-radius:12px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
}

button{
background:#1e3c72;
color:white;
border:none;
}

#status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>ABSENSI DKJ </h2>

<input type="text" id="nama" placeholder="Nama">

<select id="cabang">
<option>Jepara</option>
<option>Metro</option>
<option>Rawuh</option>
</select>

<select id="jenis">
<option>Masuk</option>
<option>Pulang</option>
</select>

<input type="file"
id="foto"
accept="image/*"
capture="user">

<input type="text"
id="lokasi"
placeholder="Lokasi"
readonly>

<button onclick="ambilLokasi()">
📍 Ambil Lokasi
</button>

<button onclick="kirim()">
Kirim Absensi
</button>

<p id="status"></p>

</div>

<script>

function ambilLokasi(){

navigator.geolocation.getCurrentPosition(

function(pos){

document.getElementById("lokasi").value =
pos.coords.latitude + "," +
pos.coords.longitude;

},

function(){

alert("GPS gagal");

}

);

}

function kirim(){

const file =
document.getElementById("foto")
.files[0];

if(!file){

alert("Foto wajib");
return;

}

const reader =
new FileReader();

reader.onloadend = function(){

const data = {

nama:
document.getElementById("nama").value,

cabang:
document.getElementById("cabang").value,

jenis:
document.getElementById("jenis").value,

lokasi:
document.getElementById("lokasi").value,

foto:
reader.result

};

fetch("https://script.google.com/macros/s/AKfycbxB49l2jbME-bvEESSDHsg3ILzUu0dPP9Gb9RjMP-YpeNhfQrpnTwWs3FHh_415nRH8FA/exec",{

method:"POST",

body:JSON.stringify(data)

})

.then(r=>r.text())

.then(res=>{

document.getElementById("status")
.innerText = res;

})

.catch(err=>{

document.getElementById("status")
.innerText = "ERROR";

});

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
